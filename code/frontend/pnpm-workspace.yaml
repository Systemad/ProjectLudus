  date-fns: ^4.1.0
  dayjs: ^1.11.20
  eslint-plugin-oxlint: ^1.58.0
  motion: ^12.38.0
  react: ^19.2.4
  react-dom: ^19.2.4
  react-extract-colors: ^1.6.0
  react-icons: ^5.6.0
  react-instantsearch: ^7.29.0
  react-intersection-observer: ^10.0.3
