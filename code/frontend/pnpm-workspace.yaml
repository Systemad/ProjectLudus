packages:
  - apps/*
  - packages/*
  - tools/*

allowBuilds:
  esbuild: true
  typesense-instantsearch-adapter: true
  unrs-resolver: true

catalog:
  '@fontsource-variable/inter': ^5.2.8
  '@fontsource-variable/montserrat': ^5.2.8
  '@fontsource-variable/nunito-sans': ^5.2.7
  '@fontsource-variable/raleway': ^5.2.8
  '@mantine/hooks': ^9.0.0
  "@tanstack/eslint-config": ^0.4.0
  "@tanstack/eslint-plugin-router": ^1.161.6
  "@tanstack/react-router": ^1.168.10
  "@tanstack/react-router-devtools": ^1.166.11
  "@tanstack/router-plugin": ^1.167.12
  "@types/node": ^24
  "@yamada-ui/cli": ^2.1.3
  "@yamada-ui/react": ^2.1.5
  eslint-plugin-oxlint: ^1.58.0
  react-extract-colors: ^1.6.0
  react-instantsearch: ^7.29.0
  typescript: ^5
  typesense-instantsearch-adapter: ^3.0.2
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.15
  vite-plus: ^0.1.15
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest

  allowedVersions:
    vite: "*"
    vitest: "*"
