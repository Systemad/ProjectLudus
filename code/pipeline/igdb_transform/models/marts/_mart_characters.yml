version: 2
models:
    - name: mart_characters

      config:
          alias: characters
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [character_gender]
            to: ref('mart_character_genders')
            to_columns: [id]

          - type: foreign_key
            columns: [character_species]
            to: ref('mart_character_species')
            to_columns: [id]

          - type: foreign_key
            columns: [mug_shot]
            to: ref('mart_character_mug_shots')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: games
            data_type: jsonb
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: slug
            data_type: character varying
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: mug_shot
            data_type: bigint
            description: ""
          - name: character_gender
            data_type: bigint
            description: ""
          - name: character_species
            data_type: bigint
            description: ""
          - name: description
            data_type: character varying
            description: ""
          - name: akas
            data_type: jsonb
            description: ""
