version: 2
models:
    - name: mart_event_networks

      config:
          alias: event_networks
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [event]
            to: ref('mart_events')
            to_columns: [id]

          - type: foreign_key
            columns: [network_type]
            to: ref('mart_network_types')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: event
            data_type: bigint
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: network_type
            data_type: bigint
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
