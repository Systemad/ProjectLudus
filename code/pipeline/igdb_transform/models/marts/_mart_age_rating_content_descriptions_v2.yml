version: 2
models:
    - name: mart_age_rating_content_descriptions_v2

      config:
          alias: age_rating_content_descriptions_v2
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [description_type]
            to: ref('mart_age_rating_content_description_types')
            to_columns: [id]

          - type: foreign_key
            columns: [organization]
            to: ref('mart_age_rating_organizations')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: description
            data_type: character varying
            description: ""
          - name: organization
            data_type: bigint
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: description_type
            data_type: bigint
            description: ""
