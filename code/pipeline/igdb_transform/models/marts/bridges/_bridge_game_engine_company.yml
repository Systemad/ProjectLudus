version: 2
models:
    - name: bridge_game_engine_company

      config:
          contract: { enforced: true }
          alias: "game_engine_company"
      constraints:
          - type: primary_key
            columns: [game_engine_id, company_id]

          - type: foreign_key
            columns: [game_engine_id]
            to: ref('mart_game_engines')
            to_columns: [id]

          - type: foreign_key
            columns: [company_id]
            to: ref('mart_companies')
            to_columns: [id]

      description: ""
      columns:
          - name: game_engine_id
            data_type: bigint
            description: ""
          - name: company_id
            data_type: bigint
            description: ""
