version: 2
models:
    - name: bridge_game_game_mode

      config:
          contract: { enforced: true }
          alias: "game_game_mode"
      constraints:
          - type: primary_key
            columns: [game_id, game_mode_id]

          - type: foreign_key
            columns: [game_id]
            to: ref('mart_games')
            to_columns: [id]

          - type: foreign_key
            columns: [game_mode_id]
            to: ref('mart_game_modes')
            to_columns: [id]

      description: ""
      columns:
          - name: game_id
            data_type: bigint
            description: ""
          - name: game_mode_id
            data_type: bigint
            description: ""
