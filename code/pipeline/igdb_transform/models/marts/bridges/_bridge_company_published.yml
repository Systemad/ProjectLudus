version: 2
models:
    - name: bridge_company_published

      config:
          contract: { enforced: true }
          alias: "company_published"

      constraints:
          - type: primary_key
            columns: [company_id, game_id]

          - type: foreign_key
            columns: [company_id]
            to: ref('mart_companies')
            to_columns: [id]

          - type: foreign_key
            columns: [game_id]
            to: ref('mart_games')
            to_columns: [id]

      description: ""
      columns:
          - name: company_id
            data_type: bigint
            description: ""
          - name: game_id
            data_type: bigint
            description: ""
