version: 2
models:
    - name: mart_game_popularity_latest

      config:
          alias: game_popularity_latest
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [game_id, popularity_type, external_popularity_source]

          - type: foreign_key
            columns: [game_id]
            to: ref('mart_games')
            to_columns: [id]

          - type: foreign_key
            columns: [popularity_type]
            to: ref('mart_popularity_types')
            to_columns: [id]

          - type: foreign_key
            columns: [external_popularity_source]
            to: ref('mart_external_game_sources')
            to_columns: [id]

      description: "Latest popularity snapshot per game, popularity type, and external source."
      columns:
          - name: id
            data_type: text
            description: "Source popularity primitive id selected as latest for the key."
          - name: game_id
            data_type: bigint
            description: ""
          - name: popularity_type
            data_type: bigint
            description: ""
          - name: external_popularity_source
            data_type: bigint
            description: ""
          - name: value
            data_type: double precision
            description: ""
          - name: calculated_at
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: updated_at_tz
            data_type: TIMESTAMPTZ
            description: ""
          - name: snapshot_date
            data_type: DATE
            description: ""
