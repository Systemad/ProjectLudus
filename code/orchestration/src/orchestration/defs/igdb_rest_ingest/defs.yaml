type: dagster_dlt.DltLoadCollectionComponent

attributes:
    loads:
        - source: .loads.popularity
          pipeline: .loads.pipeline
          translation:
              group_name: igdb_popularity_data
              description: "Load popularity data from IGDB"

        - source: .loads.default
          pipeline: .loads.pipeline
          translation:
              group_name: igdb_default
              description: "Load default data from IGDB"

requirements:
    env:
        - IGDB_CLIENT_ID
        - IGDB_ACCESS_TOKEN
