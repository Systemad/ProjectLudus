version: 2
models:
  - name: mart_external_games

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - id

    config:
      alias: external_games
      contract: { enforced: true }

    constraints:
      - type: primary_key
        columns: [ id ]

      - type: foreign_key
        columns: [ game ]
        to: ref('mart_games')
        to_columns: [ id ]

      - type: foreign_key
        columns: [ platform ]
        to: ref('mart_platforms')
        to_columns: [ id ]

      - type: foreign_key
        columns: [ external_game_source ]
        to: ref('mart_external_game_sources')
        to_columns: [ id ]

      - type: foreign_key
        columns: [ game_release_format ]
        to: ref('mart_game_release_formats')
        to_columns: [ id ]

    description: ""
    columns:
      - name: id
        data_type: bigint
        description: ""
        tests:
          - not_null
          - unique
      - name: created_at
        data_type: bigint
        description: ""
      - name: game
        data_type: bigint
        description: ""
      - name: name
        data_type: character varying
        description: ""
      - name: uid
        data_type: character varying
        description: ""
      - name: updated_at
        data_type: bigint
        description: ""
      - name: url
        data_type: character varying
        description: ""
      - name: checksum
        data_type: character varying
        description: ""
      - name: year
        data_type: bigint
        description: ""
      - name: platform
        data_type: bigint
        description: ""
      - name: countries
        data_type: jsonb
        description: ""
        constraints:
          - type: not_null
      - name: game_release_format
        data_type: bigint
        description: ""
      - name: external_game_source
        data_type: bigint
        description: ""
