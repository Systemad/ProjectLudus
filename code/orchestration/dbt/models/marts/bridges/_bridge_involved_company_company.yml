version: 2
models:
  - name: bridge_involved_company_company

    config:
      contract: { enforced: true }
      alias: "involved_company_company"

    constraints:
      - type: primary_key
        columns: [involved_company_id, company_id]

      - type: foreign_key
        columns: [involved_company_id]
        to: ref('mart_involved_companies')
        to_columns: [id]

      - type: foreign_key
        columns: [company_id]
        to: ref('mart_companies')
        to_columns: [id]

    description: ""
    columns:
      - name: involved_company_id
        data_type: bigint
        description: ""
      - name: company_id
        data_type: bigint
        description: ""
