version: 2
models:
    - name: bridge_game_player_perspective

      config:
          contract: { enforced: true }
          alias: "game_player_perspective"
      constraints:
          - type: primary_key
            columns: [game_id, player_perspective_id]

          - type: foreign_key
            columns: [game_id]
            to: ref('mart_games')
            to_columns: [id]

          - type: foreign_key
            columns: [player_perspective_id]
            to: ref('mart_player_perspectives')
            to_columns: [id]

      description: ""
      columns:
          - name: game_id
            data_type: bigint
            description: ""
          - name: player_perspective_id
            data_type: bigint
            description: ""
