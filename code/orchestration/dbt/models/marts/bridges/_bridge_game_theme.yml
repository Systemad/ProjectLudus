version: 2
models:
  - name: bridge_game_theme

    config:
      contract: { enforced: true }
      alias: "game_theme"
    constraints:
      - type: primary_key
        columns: [game_id, theme_id]

      - type: foreign_key
        columns: [game_id]
        to: ref('mart_games')
        to_columns: [id]

      - type: foreign_key
        columns: [theme_id]
        to: ref('mart_themes')
        to_columns: [id]

    description: ""
    columns:
      - name: game_id
        data_type: bigint
        description: ""
        tests:
          - not_null
      - name: theme_id
        data_type: bigint
        description: ""
        tests:
          - not_null
