version: 2
models:
  - name: bridge_game_platform

    config:
      contract: { enforced: true }
      alias: "game_platform"

    constraints:
      - type: primary_key
        columns: [game_id, platform_id]

      - type: foreign_key
        columns: [game_id]
        to: ref('mart_games')
        to_columns: [id]

      - type: foreign_key
        columns: [platform_id]
        to: ref('mart_platforms')
        to_columns: [id]

    description: ""
    columns:
      - name: game_id
        data_type: bigint
        description: ""
        tests:
          - not_null
      - name: platform_id
        data_type: bigint
        description: ""
        tests:
          - not_null
