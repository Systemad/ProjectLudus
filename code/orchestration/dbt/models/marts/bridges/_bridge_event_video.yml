version: 2
models:
  - name: bridge_event_video

    config:
      contract: { enforced: true }
      alias: "event_video"

    constraints:
      - type: primary_key
        columns: [ event_id, video_id ]

      - type: foreign_key
        columns: [ event_id ]
        to: ref('mart_events')
        to_columns: [ id ]

      - type: foreign_key
        columns: [ video_id ]
        to: ref('mart_videos')
        to_columns: [ id ]

    description: ""
    columns:
      - name: event_id
        data_type: bigint
        description: ""
        tests:
          - not_null
      - name: video_id
        data_type: bigint
        description: ""
        tests:
          - not_null
