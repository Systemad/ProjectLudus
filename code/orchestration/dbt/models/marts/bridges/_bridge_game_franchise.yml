version: 2
models:
  - name: bridge_game_franchise

    config:
      contract: { enforced: true }
      alias: "game_franchise"

    constraints:
      - type: primary_key
        columns: [game_id, franchise_id]

      - type: foreign_key
        columns: [game_id]
        to: ref('mart_games')
        to_columns: [id]

      - type: foreign_key
        columns: [franchise_id]
        to: ref('mart_franchises')
        to_columns: [id]

    description: ""
    columns:
      - name: game_id
        data_type: bigint
        description: ""
        tests:
          - not_null
      - name: franchise_id
        data_type: bigint
        description: ""
        tests:
          - not_null
