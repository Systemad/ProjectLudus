version: 2
models:
    - name: mart_websites

      config:
          alias: websites
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [type]
            to: ref('mart_website_types')
            to_columns: [id]

          - type: foreign_key
            columns: [game]
            to: ref('mart_games')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: game
            data_type: bigint
            description: ""
          - name: trusted
            data_type: boolean
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: type
            data_type: bigint
            description: ""
