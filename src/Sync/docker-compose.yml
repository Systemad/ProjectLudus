services:
  db:
    image: postgres:17
    container_name: igdb-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      #- "5432:5432"
      - "5433:5432"
    networks:
      - igdbnet

  worker:
    build:
      context: ./Worker
      dockerfile: Dockerfile
    container_name: igdb-worker
    depends_on:
      - db
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Twitch__IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      Twitch__IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
    networks:
      - igdbnet

networks:
  igdbnet:

volumes:
  postgres_data:
