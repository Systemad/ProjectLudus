version: 2
models:
    - name: bridge_platform_version_company

      config:
          contract: { enforced: true }
          alias: "platform_version_company"
      constraints:
          - type: primary_key
            columns: [company_id, platform_version_id]

          - type: foreign_key
            columns: [company_id]
            to: ref('mart_companies')
            to_columns: [id]

          - type: foreign_key
            columns: [platform_version_id]
            to: ref('mart_platform_versions')
            to_columns: [id]

      description: ""
      columns:
          - name: company_id
            data_type: bigint
            description: ""
          - name: platform_version_id
            data_type: bigint
            description: ""
