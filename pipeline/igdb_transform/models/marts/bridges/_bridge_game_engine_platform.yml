version: 2
models:
    - name: bridge_game_engine_platform

      config:
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [game_engine_id, platform_id]

          - type: foreign_key
            columns: [game_engine_id]
            to: ref('mart_game_engines')
            to_columns: [id]

          - type: foreign_key
            columns: [platform_id]
            to: ref('mart_platforms')
            to_columns: [id]

          - type: check
            columns: [game_engine_id, platform_id]
            expression: "game_engine_id > 0 AND platform_id > 0"

      description: ""
      columns:
          - name: game_engine_id
            data_type: bigint
            description: ""
          - name: platform_id
            data_type: bigint
            description: ""
