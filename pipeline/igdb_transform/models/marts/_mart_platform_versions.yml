version: 2
models:
    - name: mart_platform_versions

      config:
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [platform_logo]
            to: ref('mart_platform_logo')
            to_columns: [id]

          - type: foreign_key
            columns: [main_manufacturer]
            to: ref('mart_platform_version_companies')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
