            data_type: bigint
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: platform_logo
            data_type: bigint
            description: ""
          - name: slug
            data_type: character varying
            description: ""
          - name: summary
            data_type: character varying
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: cpu
            data_type: character varying
            description: ""
          - name: media
            data_type: character varying
            description: ""
          - name: memory
            data_type: character varying
            description: ""
          - name: output
            data_type: character varying
            description: ""
          - name: resolutions
            data_type: character varying
            description: ""
          - name: sound
            data_type: character varying
            description: ""
          - name: connectivity
            data_type: character varying
            description: ""
          - name: storage
