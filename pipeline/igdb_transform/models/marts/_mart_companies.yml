version: 2
models:
    - name: mart_companies
      config:
          contract: { enforced: true }

          post_hook:
              - ALTER TABLE {{ this }} ADD FOREIGN KEY (changed_company_id) REFERENCES {{ this }} (id)
              - ALTER TABLE {{ this }} ADD FOREIGN KEY (parent) REFERENCES {{ this }} (id)

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [logo]
            to: ref('mart_company_logos')
            to_columns: [id]

          #- type: foreign_key
          #  columns: [parent]
          #  to: ref('mart_companies')
          #  to_columns: [id]

          - type: foreign_key
            columns: [status]
            to: ref('mart_company_statuses')
            to_columns: [id]

          - type: foreign_key
            columns: [start_date_format]
            to: ref('mart_date_formats')
            to_columns: [id]

          #- type: foreign_key
          #  columns: [changed_company]
          #  to: ref('mart_companies')
          #  to_columns: [id]

          #- type: foreign_key
          #  columns: [change_date_format]
          #  to: ref('mart_date_formats')
          #  to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: change_date
            data_type: bigint
            description: ""
          - name: change_date_category
            data_type: bigint
            description: ""
          - name: country
            data_type: bigint
            description: ""
          - name: description
            data_type: character varying
            description: ""
          - name: logo
            data_type: bigint
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: slug
            data_type: character varying
            description: ""
          - name: start_date
            data_type: bigint
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: status
            data_type: bigint
            description: ""
          - name: start_date_format
            data_type: bigint
            description: ""
          - name: parent
            data_type: bigint
            description: ""
          - name: changed_company_id
            data_type: bigint
            description: ""
