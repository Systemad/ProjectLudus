version: 2
models:
    - name: bridge_game_engine_company
      config:
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [game_engine_id, company_id]

          - type: foreign_key
            enforced: false
            columns: [game_engine_id]
            to: ref('mart_game_engines')
            to_columns: [id]

          - type: foreign_key
            enforced: false
            columns: [company_id]
            to: ref('mart_companies')
            to_columns: [id]

          - type: check
            columns: [game_engine_id, company_id]
            expression: "game_engine_id > 0 AND company_id > 0"
      description: ""
      columns:
          - name: game_engine_id
            data_type: bigint
            description: ""
          - name: company_id
            data_type: bigint
            description: ""
