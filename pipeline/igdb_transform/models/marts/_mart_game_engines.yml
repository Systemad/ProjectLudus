version: 2
models:
    - name: mart_game_engines

      config:
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [logo]
            to: ref('mart_game_engine_logo')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: slug
            data_type: character varying
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: description
            data_type: character varying
            description: ""
          - name: logo
            data_type: bigint
            description: ""
