version: 2
models:
    - name: mart_games

      config:
          contract: { enforced: true }

      post_hook: |
          ALTER TABLE {{ this }} ADD CONSTRAINT fk_version_parent 
          FOREIGN KEY (version_parent) REFERENCES {{ this }} (id)

          ALTER TABLE {{ this }} ADD CONSTRAINT fk_parent_game 
          FOREIGN KEY (parent_game) REFERENCES {{ this }} (id)

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [franchise]
            to: ref('mart_franchises')
            to_columns: [id]

          - type: foreign_key
            columns: [game_status]
            to: ref('mart_game_statuses')
            to_columns: [id]

          - type: foreign_key
            columns: [game_type]
            to: ref('mart_game_types')
            to_columns: [id]

          #- type: foreign_key
          #  columns: [parent_game]
          #  to: ref('mart_games')
          #  to_columns: [id]

          #- type: foreign_key
          #  columns: [version_parent]
          #  to: ref('mart_games')
          #  to_columns: [id]

          - type: foreign_key
            columns: [cover]
            to: ref('mart_covers')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: parent_game
            data_type: bigint
            description: ""
          - name: slug
            data_type: character varying
            description: ""
          - name: summary
            data_type: character varying
            description: ""
          - name: cover
            data_type: bigint
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: game_type
            data_type: bigint
            description: ""
          - name: first_release_date
            data_type: bigint
            description: ""
          - name: rating
            data_type: double precision
            description: ""
          - name: rating_count
            data_type: bigint
            description: ""
          - name: total_rating
            data_type: double precision
            description: ""
          - name: total_rating_count
            data_type: bigint
            description: ""
          - name: storyline
            data_type: character varying
            description: ""
          - name: aggregated_rating
            data_type: double precision
            description: ""
          - name: aggregated_rating_count
            data_type: bigint
            description: ""
          - name: status
            data_type: bigint
            description: ""
          - name: game_status
            data_type: bigint
            description: ""
          - name: hypes
            data_type: bigint
            description: ""
          - name: version_parent
            data_type: bigint
            description: ""
          - name: version_title
            data_type: character varying
            description: ""
          - name: franchise
            data_type: bigint
            description: ""
