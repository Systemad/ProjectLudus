version: 2
models:
    - name: mart_popularity_primitives

      config:
          alias: popularity_primitives
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [external_popularity_source]
            to: ref('mart_external_game_sources')
            to_columns: [id]

          - type: foreign_key
            columns: [popularity_type]
            to: ref('mart_popularity_types')
            to_columns: [id]
      description: ""
      columns:
          - name: id
            data_type: text
            description: ""
          - name: game_id
            data_type: bigint
            description: ""
          - name: popularity_type
            data_type: bigint
            description: ""
          - name: value
            data_type: double precision
            description: ""
          - name: calculated_at
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: external_popularity_source
            data_type: bigint
            description: ""
          - name: updated_at_tz
            data_type: TIMESTAMPTZ
            description: ""
          - name: snapshot_date
            data_type: DATE
            description: ""
