version: 2
models:
    - name: mart_platforms

      config:
          alias: platforms
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [platform_family]
            to: ref('mart_platform_family')
            to_columns: [id]

          - type: foreign_key
            columns: [platform_type]
            to: ref('mart_platform_types')
            to_columns: [id]

          - type: foreign_key
            columns: [platform_logo]
            to: ref('mart_platform_logo')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: created_at
            data_type: bigint
            description: ""
          - name: updated_at
            data_type: bigint
            description: ""
          - name: alternative_name
            data_type: character varying
            description: ""
          - name: generation
            data_type: bigint
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: platform_logo
            data_type: bigint
            description: ""
          - name: slug
            data_type: character varying
            description: ""
          - name: url
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
          - name: platform_type
            data_type: bigint
            description: ""
          - name: platform_family
            data_type: bigint
            description: ""
          - name: abbreviation
            data_type: character varying
            description: ""
          - name: summary
            data_type: character varying
            description: ""
