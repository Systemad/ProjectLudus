version: 2
models:
    - name: mart_videos

      config:
          contract: { enforced: true }

      constraints:
          - type: primary_key
            columns: [id]

          - type: foreign_key
            columns: [game]
            to: ref('mart_games')
            to_columns: [id]

      description: ""
      columns:
          - name: id
            data_type: bigint
            description: ""
          - name: game
            data_type: bigint
            description: ""
          - name: name
            data_type: character varying
            description: ""
          - name: video_id
            data_type: character varying
            description: ""
          - name: checksum
            data_type: character varying
            description: ""
